{{- $projects := .Projects -}}
<section class="home-section" aria-labelledby="hardware-lab-title">
  <div class="section-heading">
    <div>
      <p class="eyebrow">Hardware Lab</p>
      <h2 id="hardware-lab-title">硬件实验室</h2>
    </div>
  </div>
  <div class="project-card-grid compact-grid">
    {{ range $projects }}
      {{ partial "project/card.html" . }}
    {{ else }}
      <p class="empty-note">硬件项目会从 content/projects 自动读取。</p>
    {{ end }}
  </div>
</section>
