{{- $projects := .Projects -}}
<section class="home-section" aria-labelledby="opensource-title">
  <div class="section-heading">
    <div>
      <p class="eyebrow">Open Source Tools</p>
      <h2 id="opensource-title">开源工具</h2>
    </div>
  </div>
  <div class="project-card-grid compact-grid">
    {{ range $projects }}
      {{ partial "project/card.html" . }}
    {{ else }}
      <p class="empty-note">工具和开源项目会从 content/projects 自动读取。</p>
    {{ end }}
  </div>
</section>
